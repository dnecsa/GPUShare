services:
  fastapi:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - render-tmp:/tmp/renders
    restart: unless-stopped

  render-worker:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    command: python -m app.workers.render_worker
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - render-tmp:/tmp/renders
    depends_on:
      - fastapi
    restart: unless-stopped

  # Cloudflare Tunnel — two modes:
  #   With TUNNEL_TOKEN set in .env: uses your configured tunnel + domain
  #   Without TUNNEL_TOKEN: run `cloudflared tunnel --url http://localhost:8000`
  #     separately to get a free trycloudflare.com URL (no account needed)
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - fastapi
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  render-tmp:
